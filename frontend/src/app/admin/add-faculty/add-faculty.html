<div class="d-flex">
  <app-admin-sidebar></app-admin-sidebar>

  <div class="main-content flex-grow-1 p-4 bg-light">
    <div class="container">
      <h3 class="mb-4 text-primary font-weight-bold">Add New Faculty</h3>

      <div *ngIf="feedback.msg" [ngClass]="feedback.type === 'success' ? 'alert-success' : 'alert-danger'" class="alert text-center shadow-sm">
        {{ feedback.msg }}
      </div>

      <div class="card shadow-lg border-0 rounded-3 p-4">
        <form #facultyForm="ngForm" (ngSubmit)="facultyForm.form.valid && formData.Password === formData.ConfirmPassword && handleSubmit()">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label fw-bold">First Name</label>
              <input type="text" name="Fname" class="form-control" [(ngModel)]="formData.Fname" #fname="ngModel" (ngModelChange)="onNameChange()" required minlength="2" [class.is-invalid]="fname.invalid && fname.touched" />
              <div class="invalid-feedback">Min 2 characters required.</div>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">Middle Name</label>
              <input type="text" name="Mname" class="form-control" [(ngModel)]="formData.Mname" />
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">Last Name</label>
              <input type="text" name="Lname" class="form-control" [(ngModel)]="formData.Lname" #lname="ngModel" (ngModelChange)="onNameChange()" required [class.is-invalid]="lname.invalid && lname.touched" />
              <div class="invalid-feedback">Last name is required.</div>
            </div>

            <div class="col-md-3">
              <label class="form-label fw-bold">Gender</label>
              <select name="Gender" class="form-select" [(ngModel)]="formData.Gender" #gender="ngModel" required [class.is-invalid]="gender.invalid && gender.touched">
                <option value="">-- Select --</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold">Date of Birth</label>
              <input type="date" name="Dob" class="form-control" [(ngModel)]="formData.Dob" #dob="ngModel" required [class.is-invalid]="dob.invalid && dob.touched" />
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold">Date of Joining</label>
              <input type="date" name="Doj" class="form-control" [(ngModel)]="formData.Doj" #doj="ngModel" required [class.is-invalid]="doj.invalid && doj.touched" />
            </div>

            <div class="col-md-3">
              <label class="form-label fw-bold">Department</label>
              <select name="Department" class="form-select" [(ngModel)]="formData.Department" #dept="ngModel" required [class.is-invalid]="dept.invalid && dept.touched">
                <option value="">-- Select Department --</option>
                <option *ngFor="let d of departments" [value]="d.deptName || d.departmentName">
                  {{ d.deptName || d.departmentName }}
                </option>
              </select>
            </div>

            <div class="col-md-3">
              <label class="form-label fw-bold text-muted">Username (Auto)</label>
              <input type="text" name="Username" class="form-control bg-light" [(ngModel)]="formData.Username" readonly />
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold">Password</label>
              <input type="password" name="Password" class="form-control" [(ngModel)]="formData.Password" #pw="ngModel" required minlength="6" [class.is-invalid]="pw.invalid && pw.touched" placeholder="Min 6 chars" />
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold">Confirm Password</label>
              <input type="password" name="ConfirmPassword" class="form-control" [(ngModel)]="formData.ConfirmPassword" #cpw="ngModel" required [class.is-invalid]="cpw.touched && formData.Password !== formData.ConfirmPassword" placeholder="Match password" />
              <div class="text-danger small" *ngIf="cpw.touched && formData.Password !== formData.ConfirmPassword">Passwords mismatch.</div>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold">Email</label>
              <input type="email" name="Email" class="form-control" [(ngModel)]="formData.Email" #mail="ngModel" required email [class.is-invalid]="mail.invalid && mail.touched" />
            </div>

            <div class="col-md-4">
              <label class="form-label fw-bold">Mobile</label>
              <input type="text" name="Mobile" class="form-control" [(ngModel)]="formData.Mobile" #mob="ngModel" required pattern="[0-9]{10}" [class.is-invalid]="mob.invalid && mob.touched" />
              <div class="invalid-feedback">10-digit number required.</div>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">Alternate Email</label>
              <input type="email" name="AltEmail" class="form-control" [(ngModel)]="formData.AltEmail" email #amail="ngModel" [class.is-invalid]="amail.invalid && amail.touched" />
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">Emergency Phone</label>
              <input type="text" name="EmergencyPhone" class="form-control" [(ngModel)]="formData.EmergencyPhone" pattern="[0-9]{10}" #emob="ngModel" [class.is-invalid]="emob.invalid && emob.touched" />
            </div>

            <div class="col-md-4">
              <label class="form-label fw-bold">Education Qualification</label>
              <input type="text" name="Education" class="form-control" [(ngModel)]="formData.Education" required #edu="ngModel" [class.is-invalid]="edu.invalid && edu.touched" />
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">Address</label>
              <textarea name="Address" class="form-control" rows="1" [(ngModel)]="formData.Address" required #addr="ngModel" [class.is-invalid]="addr.invalid && addr.touched"></textarea>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">Profile Image URL</label>
              <input type="text" name="ImageUrl" class="form-control" [(ngModel)]="formData.ImageUrl" placeholder="Optional" />
            </div>
          </div>

          <div class="text-end mt-4">
            <button type="submit" class="btn btn-primary px-5 fw-bold shadow rounded-pill" [disabled]="facultyForm.invalid || formData.Password !== formData.ConfirmPassword">
              Save Faculty Profile
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
