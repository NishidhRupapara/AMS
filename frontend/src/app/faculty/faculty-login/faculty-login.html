<div class="login-container shadow p-4 rounded bg-white" style="max-width: 400px; margin: 100px auto;">
  <h2 class="text-center text-primary mb-4 fw-bold">Faculty Login</h2>

  <div *ngIf="error" class="alert alert-danger py-2 small text-center">{{ error }}</div>

  <form #facultyLoginForm="ngForm" (ngSubmit)="facultyLoginForm.form.valid && handleSubmit()">
    <div class="mb-3">
      <label class="form-label fw-bold small">Email Address / Username</label>
      <input type="text" name="Email" class="form-control shadow-none" [(ngModel)]="form.Email" #fmail="ngModel" placeholder="JohnDoe" required [class.is-invalid]="fmail.invalid && fmail.touched">
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold small">Password</label>
      <input type="password" name="Password" class="form-control shadow-none" [(ngModel)]="form.Password" #fpass="ngModel" placeholder="••••••" required [class.is-invalid]="fpass.invalid && fpass.touched">
    </div>

    <button type="submit" class="btn btn-primary w-100 fw-bold shadow-sm rounded-3 py-2" [disabled]="loading || facultyLoginForm.invalid">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
      {{ loading ? 'REDIRECTING...' : 'LOGIN' }}
    </button>
  </form>
</div>
