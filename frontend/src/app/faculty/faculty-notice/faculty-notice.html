<div class="d-flex bg-light min-vh-100">
  <app-faculty-sidebar></app-faculty-sidebar>

  <div class="main-content flex-grow-1 p-4">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
      <h2 class="fw-bold text-dark mb-0">
        <i class="fa fa-bullhorn text-primary me-2"></i> Notice Board
      </h2>
      <button class="btn btn-outline-primary btn-sm" (click)="fetchNotices()">
        <i class="fas fa-sync-alt me-1"></i> Refresh
      </button>
    </div>

    <div *ngIf="loading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="text-muted mt-2">⏳ Loading notices...</p>
    </div>

    <div *ngIf="error" class="alert alert-danger shadow-sm border-0">
      {{ error }}
    </div>

    <div *ngIf="!loading && !error">
      <div *ngIf="notices.length > 0; else noNotices">
        
        <div *ngFor="let notice of notices; let i = index" class="card notice-card mb-3 shadow-sm border-0">
          <div class="card-body p-4">
            <h5 class="notice-title fw-bold text-primary d-flex align-items-center">
              {{ i + 1 }}. {{ notice.noticeTitle }}
              <span *ngIf="isNew(notice.createdAt)" class="badge bg-danger ms-2 rounded-pill shadow-sm animate-pulse">
                NEW
              </span>
            </h5>

            <p class="text-secondary mt-3 mb-3" style="white-space: pre-line; line-height: 1.6;">
              {{ notice.noticeMessage || 'No description provided' }}
            </p>

            <div class="notice-meta mt-3 pt-2 border-top text-muted small">
              <i class="fa fa-calendar-alt me-1"></i> 
              {{ notice.createdAt | date:'dd MMM yyyy, hh:mm a' }}
            </div>
          </div>
        </div>

      </div>

      <ng-template #noNotices>
        <div class="alert alert-info border-0 shadow-sm text-center py-5">
          <i class="fas fa-info-circle fa-2x mb-3"></i>
          <p class="mb-0">📢 No notices available at the moment.</p>
        </div>
      </ng-template>
    </div>
  </div>
</div>
