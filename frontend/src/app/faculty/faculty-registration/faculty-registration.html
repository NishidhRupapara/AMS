<div class="register-page d-flex justify-content-center align-items-center min-vh-100 bg-light">
  <div class="register-card shadow-lg p-4 p-md-5 rounded-4 col-11 col-md-8 col-lg-6 bg-white">
    <h2 class="text-center mb-4 text-primary fw-bold">Faculty Registration</h2>

    <div *ngIf="facultyId" class="alert alert-success text-center fw-semibold">
      🎉 Registration Complete! Your Faculty ID: <b>{{ facultyId }}</b>
    </div>

    <form (ngSubmit)="handleSubmit()" #regForm="ngForm">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">First Name</label>
          <input type="text" name="fname" class="form-control" [(ngModel)]="form.fname" (input)="onNameChange()" required />
        </div>
        <div class="col-md-4">
          <label class="form-label">Middle Name</label>
          <input type="text" name="mname" class="form-control" [(ngModel)]="form.mname" />
        </div>
        <div class="col-md-4">
          <label class="form-label">Last Name</label>
          <input type="text" name="lname" class="form-control" [(ngModel)]="form.lname" (input)="onNameChange()" required />
        </div>

        <div class="col-md-6">
          <label class="form-label">Gender</label>
          <select name="gender" class="form-select" [(ngModel)]="form.gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Date of Birth</label>
          <input type="date" name="dob" class="form-control" [(ngModel)]="form.dob" required />
        </div>

        <div class="col-12">
          <p class="text-danger small fw-semibold">* Username auto-generated from First + Last Name *</p>
        </div>

        <div class="col-md-4">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" [(ngModel)]="form.username" readonly />
        </div>
        <div class="col-md-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" [(ngModel)]="form.password" required />
        </div>
        <div class="col-md-4">
          <label class="form-label">Confirm Password</label>
          <input type="password" name="cpassword" class="form-control" [(ngModel)]="form.cpassword" required />
        </div>

        <div class="col-md-4">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" [(ngModel)]="form.email" required />
        </div>
        <div class="col-md-4">
          <label class="form-label">Mobile</label>
          <input type="tel" name="mobile" class="form-control" [(ngModel)]="form.mobile" pattern="[0-9]{10}" required />
        </div>
        <div class="col-md-4">
          <label class="form-label">Department</label>
          <select name="department" class="form-select" [(ngModel)]="form.department" required>
            <option value="">Select Department</option>
            <option *ngFor="let dept of departments" [value]="dept.departmentName">
              {{ dept.departmentName }}
            </option>
          </select>
        </div>

        <div class="col-md-4">
          <label class="form-label">Date of Joining</label>
          <input type="date" name="doj" class="form-control" [(ngModel)]="form.doj" required />
        </div>
        <div class="col-md-4">
          <label class="form-label">Address</label>
          <input type="text" name="address" class="form-control" [(ngModel)]="form.address" required />
        </div>
        <div class="col-md-4">
          <label class="form-label">Education</label>
          <input type="text" name="education" class="form-control" [(ngModel)]="form.education" required />
        </div>

        <div class="col-md-6">
          <label class="form-label">Alternate Email</label>
          <input type="email" name="altEmail" class="form-control" [(ngModel)]="form.altEmail" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Emergency Phone</label>
          <input type="tel" name="emergencyPhone" class="form-control" [(ngModel)]="form.emergencyPhone" pattern="[0-9]{10}" required />
        </div>
      </div>

      <p *ngIf="error" class="text-danger text-center fw-semibold mt-3">{{ error }}</p>
      <p *ngIf="loading" class="text-center text-primary mt-2">⏳ Registering...</p>

      <button type="submit" class="btn btn-primary w-100 py-2 mt-3 fs-5 fw-semibold" [disabled]="loading || !regForm.valid">
        {{ loading ? "Registering..." : "Register" }}
      </button>
    </form>

    <p class="text-center mt-3 mb-0">
      Already have an account? 
      <a routerLink="/faculty-login" class="text-primary fw-bold" style="text-decoration: none;">Login here</a>
    </p>
  </div>
</div>
