<div class="d-flex bg-light min-vh-100">
  <app-faculty-sidebar></app-faculty-sidebar>

  <div class="main-content flex-grow-1 p-4">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
      <h3 class="text-primary fw-bold mb-0">
        <i class="fas fa-comment-dots me-2"></i> Suggestion Portal
      </h3>
      <div class="btn-group">
        <button class="btn" [ngClass]="viewMode === 'add' ? 'btn-primary' : 'btn-outline-primary'" 
                (click)="switchMode('add')">New Suggestion</button>
        <button class="btn" [ngClass]="viewMode === 'list' ? 'btn-primary' : 'btn-outline-primary'" 
                (click)="switchMode('list')">View History</button>
      </div>
    </div>

    <div *ngIf="feedback.msg" class="alert alert-{{feedback.type}} shadow-sm animate-slide">
      {{ feedback.msg }}
    </div>

    <div *ngIf="viewMode === 'add'" class="card border-0 shadow-sm p-4 animate-fade">
      <p class="text-muted">Have an idea to improve the system? Let the admin know below.</p>
      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label fw-bold">Subject / Title</label>
          <input type="text" class="form-control py-2" [(ngModel)]="form.title" name="title" 
                 required placeholder="e.g. Schedule change, Lab maintenance...">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Detailed Message</label>
          <textarea class="form-control" rows="6" [(ngModel)]="form.message" name="message" 
                    required placeholder="Write your suggestion here..."></textarea>
        </div>
        <div class="text-end">
          <button type="submit" class="btn btn-primary px-5 shadow-sm">
            <i class="fas fa-paper-plane me-2"></i> Submit to Admin
          </button>
        </div>
      </form>
    </div>

    <div *ngIf="viewMode === 'list'" class="animate-fade">
      <div *ngIf="isLoading" class="text-center py-5">
        <div class="spinner-border text-primary"></div>
      </div>

      <div *ngIf="!isLoading && mySuggestions.length === 0" class="text-center py-5 text-muted">
        <i class="fas fa-folder-open fa-3x mb-3"></i>
        <p>No suggestions submitted yet.</p>
      </div>

      <div *ngFor="let s of mySuggestions" class="card mb-4 border-0 shadow-sm overflow-hidden">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
          <span class="fw-bold text-dark">{{ s.title }}</span>
          <span class="badge rounded-pill px-3" 
                [ngClass]="s.status === 'Pending' ? 'bg-warning text-dark' : 'bg-success'">
            {{ s.status }}
          </span>
        </div>
        <div class="card-body">
          <p class="text-secondary small border-bottom pb-2">{{ s.message }}</p>
          
          <div class="reply-box p-3 rounded-3 mt-3">
            <div class="d-flex align-items-center mb-1">
              <i class="fas fa-reply text-primary me-2"></i>
              <span class="fw-bold text-primary small">Admin Response</span>
            </div>
            <p class="mb-0 text-dark italic small">{{ s.reply || 'No reply yet' }}</p>
          </div>
        </div>
        <div class="card-footer bg-light text-muted extra-small d-flex justify-content-between">
          <span>ID: #{{ s.suggestionId }}</span>
          <span>Submitted: {{ s.postedAt | date:'medium' }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
