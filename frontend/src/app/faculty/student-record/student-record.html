<div class="d-flex bg-light min-vh-100">
  <app-faculty-sidebar></app-faculty-sidebar>

  <div class="main-content flex-grow-1 p-4">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
      <h3 class="text-primary fw-bold mb-0"><i class="fas fa-file-invoice me-2"></i> Attendance Reports</h3>
      <button class="btn btn-success fw-bold shadow-sm" (click)="exportExcel()">
        <i class="fas fa-file-excel me-2"></i> Export to Excel
      </button>
    </div>

    <div class="card border-0 shadow-sm rounded-3 mb-4">
      <div class="card-body p-4">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label small fw-bold text-muted">From Date</label>
            <input type="date" [(ngModel)]="startDate" (change)="applyFilters()" class="form-control">
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-bold text-muted">To Date</label>
            <input type="date" [(ngModel)]="endDate" (change)="applyFilters()" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-bold text-muted">Search Records</label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
              <input type="text" [(ngModel)]="searchTerm" (input)="applyFilters()" 
                     class="form-control border-start-0" placeholder="Search by Student Name or Roll No...">
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
      <div class="card-body p-0">
        <div *ngIf="isLoading" class="text-center py-5">
          <div class="spinner-border text-primary"></div>
          <p class="mt-2 text-muted">Generating Report...</p>
        </div>

        <div class="table-responsive" *ngIf="!isLoading">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th class="ps-4">Date</th>
                <th>Roll No</th>
                <th>Full Name</th>
                <th>Attendance Status</th>
                <th>Remarks</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let record of filteredHistory">
                <td class="ps-4 text-muted">{{ record.date | date:'mediumDate' }}</td>
                <td class="fw-bold">#{{ record.studentId }}</td>
                <td>{{ record.fullname }}</td>
                <td>
                  <span class="badge rounded-pill px-3 py-2" 
                    [ngClass]="record.status === 'Present' ? 'bg-success' : 'bg-danger'">
                    {{ record.status }}
                  </span>
                </td>
                <td class="text-muted small">{{ record.remark || '--' }}</td>
              </tr>
              <tr *ngIf="filteredHistory.length === 0">
                <td colspan="5" class="text-center py-5 text-muted">
                  No attendance records found for the selected criteria.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
