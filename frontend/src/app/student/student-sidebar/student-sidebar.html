<div class="custom-sidebar d-flex flex-column justify-content-between vh-100 p-0 shadow">
  <div>
    <div class="text-center py-4 border-bottom border-dark mb-2">
      <h4 class="mb-0 fw-bold text-white tracking-wide">Student Portal</h4>
      <small class="text-info mt-1 d-block">{{ studentName }}</small>
    </div>

    <ul class="nav flex-column px-2 gap-1 mt-2">
      <li class="nav-item">
        <a class="nav-link py-2 px-3 rounded d-flex justify-content-between align-items-center"
          (click)="navigateTo('/student-home')" [class.active-link]="isActive('/student-home')" style="cursor: pointer;">
          <span>🏠 &nbsp; Dashboard</span>
          <i class="fas fa-caret-right small-arrow"></i>
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link py-2 px-3 rounded d-flex justify-content-between align-items-center"
          (click)="navigateTo('/view-my-attendance')" [class.active-link]="isActive('/view-my-attendance')" style="cursor: pointer;">
          <span>📅 &nbsp; My Attendance</span>
          <i class="fas fa-caret-right small-arrow"></i>
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link py-2 px-3 rounded d-flex justify-content-between align-items-center"
          (click)="navigateTo('/view-results')" [class.active-link]="isActive('/view-results')" style="cursor: pointer;">
          <span>🎓 &nbsp; Exam Results</span>
          <i class="fas fa-caret-right small-arrow"></i>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link py-2 px-3 rounded d-flex justify-content-between align-items-center"
          (click)="navigateTo('/exam-attempt')" [class.active-link]="isActive('/exam-attempt')" style="cursor: pointer;">
          <span>✍️ &nbsp; Attempt Exam</span>
          <i class="fas fa-caret-right small-arrow"></i>
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link py-2 px-3 rounded d-flex justify-content-between align-items-center"
          (click)="navigateTo('/my-assignments')" [class.active-link]="isActive('/my-assignments')" style="cursor: pointer;">
          <span>📚 &nbsp; Assignments</span>
          <i class="fas fa-caret-right small-arrow"></i>
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link py-2 px-3 rounded d-flex justify-content-between align-items-center"
          (click)="navigateTo('/my-study-material')" [class.active-link]="isActive('/my-study-material')" style="cursor: pointer;">
          <span>📖 &nbsp; Study Material</span>
          <i class="fas fa-caret-right small-arrow"></i>
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link py-2 px-3 rounded d-flex justify-content-between align-items-center"
          (click)="navigateTo('/student-notices')" [class.active-link]="isActive('/student-notices')" style="cursor: pointer;">
          <span>🔔 &nbsp; Notices</span>
          <i class="fas fa-caret-right small-arrow"></i>
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link py-2 px-3 rounded d-flex justify-content-between align-items-center"
          (click)="navigateTo('/student-suggestion')" [class.active-link]="isActive('/student-suggestion')" style="cursor: pointer;">
          <span>💡 &nbsp; Suggestions</span>
          <i class="fas fa-caret-right small-arrow"></i>
        </a>
      </li>

      <li class="nav-item border-top border-dark mt-2 pt-2">
        <a class="nav-link py-2 px-3 rounded d-flex justify-content-between align-items-center"
          (click)="navigateTo('/student-profile')" [class.active-link]="isActive('/student-profile')" style="cursor: pointer;">
          <span>👤 &nbsp; My Profile</span>
          <i class="fas fa-caret-right small-arrow"></i>
        </a>
      </li>
    </ul>
  </div>

  <div class="p-3 border-top border-dark">
    <button class="btn btn-danger w-100 fw-bold shadow-sm logout-btn" (click)="handleLogout()">
      🚪 Logout
    </button>
  </div>
</div>
