<div class="d-flex bg-light min-vh-100">
  <app-student-sidebar></app-student-sidebar>
  <div class="flex-grow-1 p-4">
    <div class="container-fluid">
      <div class="card border-0 shadow-sm rounded-4 p-4 bg-success text-white mb-4">
        <h2 class="fw-bold mb-0">Study Resources 📖</h2>
        <p class="opacity-75 mb-0">Access notes and materials shared by your faculties</p>
      </div>

      <div *ngIf="isLoading" class="text-center py-5">
        <div class="spinner-border text-success"></div>
      </div>

      <div class="row g-4" *ngIf="!isLoading">
        <div class="col-md-6 col-lg-3" *ngFor="let m of materials">
          <div class="card h-100 border-0 shadow-sm rounded-4 material-card">
            <div class="card-body text-center p-4">
              <div class="rounded-circle bg-success-subtle p-3 d-inline-block mb-3">
                <i class="fas fa-file-pdf text-success fs-3"></i>
              </div>
              <h6 class="text-muted small fw-bold">{{ m.subject }}</h6>
              <h5 class="fw-bold mb-3">{{ m.title }}</h5>
              <a [href]="m.link" target="_blank" class="btn btn-success rounded-pill w-100 fw-bold">
                Download Notes
              </a>
            </div>
          </div>
        </div>

        <div *ngIf="materials.length === 0" class="col-12 text-center py-5 text-muted">
          <i class="fas fa-book-open fa-3x mb-3"></i>
          <p>No study materials have been shared for your department yet.</p>
        </div>
      </div>
    </div>
  </div>
</div>
